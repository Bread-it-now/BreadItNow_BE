version: '3.9'

services:
  bin-mysql:
    image: mysql:8.4.3
    container_name: bin-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  bin-redis:
    image: redis:latest
    container_name: bin-redis
    ports:
      - "6379:6379"
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  bin-network:
    external: true
