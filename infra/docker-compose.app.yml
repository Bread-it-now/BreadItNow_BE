version: '3.9'

services:
  gateway:
    image: ${DOCKER_USERNAME}/breaditnow-gateway:latest
    container_name: breaditnow-gateway
    ports:
      - "8080:8080"
    restart: always
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      AUTH_TOKEN_SECRET_KEY: ${AUTH_TOKEN_SECRET_KEY}
      DISCORD_USERNAME: ${DISCORD_USERNAME}
      DISCORD_AVATAR_URL: ${DISCORD_AVATAR_URL}
      DISCORD_ERROR_URL: ${DISCORD_ERROR_URL}
      BREADITNOW_WEB_HTTP_HOST: ${BREADITNOW_WEB_HTTP_HOST}
      BREADITNOW_WEB_HTTPS_HOST: ${BREADITNOW_WEB_HTTPS_HOST}
      BREADITNOW_API_HTTP_HOST: ${BREADITNOW_API_HTTP_HOST}
      BREADITNOW_API_HTTPS_HOST: ${BREADITNOW_API_HTTPS_HOST}
    volumes:
      - ${LOG_VOLUME_PATH}/gateway:/app/logs/gateway
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  auth-api:
    image: ${DOCKER_USERNAME}/breaditnow-auth-api:latest
    container_name: breaditnow-auth-api
    ports:
      - "9000:9000"
    restart: always
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      DATASOURCE_URL: ${DATASOURCE_URL}
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      OAUTH2_KAKAO_CLIENT_ID: ${OAUTH2_KAKAO_CLIENT_ID}
      OAUTH2_KAKAO_CLIENT_SECRET: ${OAUTH2_KAKAO_CLIENT_SECRET}
      OAUTH2_KAKAO_REDIRECT_URI: ${OAUTH2_KAKAO_REDIRECT_URI}
      OAUTH2_NAVER_CLIENT_ID: ${OAUTH2_NAVER_CLIENT_ID}
      OAUTH2_NAVER_CLIENT_SECRET: ${OAUTH2_NAVER_CLIENT_SECRET}
      OAUTH2_NAVER_REDIRECT_URI: ${OAUTH2_NAVER_REDIRECT_URI}
      AUTH_TOKEN_SECRET_KEY: ${AUTH_TOKEN_SECRET_KEY}
      REFRESH_COOKIE_KEY: ${REFRESH_COOKIE_KEY}
      DISCORD_USERNAME: ${DISCORD_USERNAME}
      DISCORD_AVATAR_URL: ${DISCORD_AVATAR_URL}
      DISCORD_ERROR_URL: ${DISCORD_ERROR_URL}
      BREADITNOW_API_HTTPS_HOST: ${BREADITNOW_API_HTTPS_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    volumes:
      - ${LOG_VOLUME_PATH}/auth-api:/app/logs/auth-api
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  customer-api:
    image: ${DOCKER_USERNAME}/breaditnow-customer-api:latest
    container_name: breaditnow-customer-api
    ports:
      - "9001:9001"
    restart: always
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DATASOURCE_URL: ${DATASOURCE_URL}
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      OAUTH2_KAKAO_CLIENT_ID: ${OAUTH2_KAKAO_CLIENT_ID}
      AWS_S3_CREDENTIALS_ACCESS_KEY: ${AWS_S3_CREDENTIALS_ACCESS_KEY}
      AWS_S3_CREDENTIALS_SECRET_KEY: ${AWS_S3_CREDENTIALS_SECRET_KEY}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      DISCORD_USERNAME: ${DISCORD_USERNAME}
      DISCORD_AVATAR_URL: ${DISCORD_AVATAR_URL}
      DISCORD_ERROR_URL: ${DISCORD_ERROR_URL}
      BREADITNOW_API_HTTPS_HOST: ${BREADITNOW_API_HTTPS_HOST}
    volumes:
      - ${LOG_VOLUME_PATH}/customer-api:/app/logs/customer-api
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9001/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  owner-api:
    image: ${DOCKER_USERNAME}/breaditnow-owner-api:latest
    container_name: breaditnow-owner-api
    ports:
      - "9002:9002"
    restart: always
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DATASOURCE_URL: ${DATASOURCE_URL}
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      OAUTH2_KAKAO_CLIENT_ID: ${OAUTH2_KAKAO_CLIENT_ID}
      AUTH_TOKEN_SECRET_KEY: ${AUTH_TOKEN_SECRET_KEY}
      AWS_S3_CREDENTIALS_ACCESS_KEY: ${AWS_S3_CREDENTIALS_ACCESS_KEY}
      AWS_S3_CREDENTIALS_SECRET_KEY: ${AWS_S3_CREDENTIALS_SECRET_KEY}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      DISCORD_USERNAME: ${DISCORD_USERNAME}
      DISCORD_AVATAR_URL: ${DISCORD_AVATAR_URL}
      DISCORD_ERROR_URL: ${DISCORD_ERROR_URL}
      BREADITNOW_API_HTTPS_HOST: ${BREADITNOW_API_HTTPS_HOST}
    volumes:
      - ${LOG_VOLUME_PATH}/owner-api:/app/logs/owner-api
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9002/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  bin-network:
    external: true
