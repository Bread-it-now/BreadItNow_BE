server:
  port: 9000

spring:
  application:
    name: auth-api

  banner:
    location: static/banner/banner.txt
    charset: UTF-8

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${OAUTH2_KAKAO_CLIENT_ID}
            client-secret: ${OAUTH2_KAKAO_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_KAKAO_REDIRECT_URI}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            client-name: kakao
          naver:
            client-id: ${OAUTH2_NAVER_CLIENT_ID}
            client-secret: ${OAUTH2_NAVER_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_NAVER_REDIRECT_URI}
            client-name: naver
            authorization-grant-type: authorization_code
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization_uri: https://nid.naver.com/oauth2.0/authorize
            token_uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user_name_attribute: response

  mail:
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

sms:
  sender: ${SMS_SENDER}
  auth-code:
    ttl-seconds: 180
    body-template: "[빵잇나우] 인증코드 {code} (유효 {ttl}분)"

mail:
  auth-code:
    ttl-seconds: 300
    subject: "[빵잇나우] 이메일 인증 코드"
    body-template: |
      안녕하세요!
      빵잇나우 회원가입 인증 코드입니다.

      인증 코드: {code}
      (유효 시간: {ttl}분)

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

logging:
  config: classpath:logging/logback-spring.xml
  file:
    path: logs
  level:
    root: INFO

auth:
  token:
    secret-key: ${AUTH_TOKEN_SECRET_KEY}
    access-token-valid-millisecond: 86400000 # 1 day in milliseconds
    refresh-token-valid-millisecond: 604800000 # 7 days in milliseconds
    refresh-cookie-key: ${REFRESH_COOKIE_KEY}

webhook:
  discord:
    username: ${DISCORD_USERNAME}
    avatar-url: ${DISCORD_AVATAR_URL}
    error-url: ${DISCORD_ERROR_URL}

management:
  endpoints:
    web:
      exposure:
        include: health


