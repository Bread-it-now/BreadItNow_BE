name: Deploy to EC2

on:
  push:
    branches:
      - "develop"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTION_TOKEN }}
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Give permissions to gradlew
        run: chmod +x gradlew

      - name: Copy firebase-service-key.json for notification-api
        run: |
          mkdir -p breaditnow-notification-api/src/main/resources/config
          cp config/breaditnow-fcm.json breaditnow-notification-api/src/main/resources/config/breaditnow-fcm.json

      - name: Build All Modules
        run: |
          ./gradlew clean buildAll

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breaditnow-gateway ./breaditnow-gateway
          docker push ${{ secrets.DOCKER_USERNAME }}/breaditnow-gateway

          docker build -t ${{ secrets.DOCKER_USERNAME }}/breaditnow-auth-api ./breaditnow-auth-api
          docker push ${{ secrets.DOCKER_USERNAME }}/breaditnow-auth-api

          docker build -t ${{ secrets.DOCKER_USERNAME }}/breaditnow-customer-api ./breaditnow-customer-api
          docker push ${{ secrets.DOCKER_USERNAME }}/breaditnow-customer-api

          docker build -t ${{ secrets.DOCKER_USERNAME }}/breaditnow-owner-api ./breaditnow-owner-api
          docker push ${{ secrets.DOCKER_USERNAME }}/breaditnow-owner-api
          
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breaditnow-reservation-api ./breaditnow-reservation-api
          docker push ${{ secrets.DOCKER_USERNAME }}/breaditnow-reservation-api

          docker build -t ${{ secrets.DOCKER_USERNAME }}/breaditnow-notification-api ./breaditnow-notification-api
          docker push ${{ secrets.DOCKER_USERNAME }}/breaditnow-notification-api

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}

      - name: Copy docker-compose file and .env.prod to EC2
        run: |
          scp -o StrictHostKeyChecking=no ./infra/docker-compose.app.yml ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/ubuntu/breaditnow/docker/docker-compose.app.yml
          scp -o StrictHostKeyChecking=no ./config/.env.prod ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/ubuntu/breaditnow/docker/.env

      - name: SSH into EC2 and Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }} << 'EOF'
            cd /home/ubuntu/breaditnow/docker
            docker-compose -f docker-compose.app.yml down
            docker-compose -f docker-compose.app.yml pull
            docker-compose -f docker-compose.app.yml up -d
          EOF