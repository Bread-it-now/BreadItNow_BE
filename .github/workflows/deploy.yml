name: Deploy to EC2

on:
  push:
    branches:
      - "feat/93-github-action-cicd"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Give permissions to gradlew
        run: chmod +x gradlew

      - name: Build All Modules
        run: |
          ./gradlew clean buildAll

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}

      - name: Copy jar files to EC2
        run: |
          #          scp -o StrictHostKeyChecking=no breaditnow-gateway/build/libs/*.jar ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/ubuntu/breaditnow/service/gateway/
          #          scp -o StrictHostKeyChecking=no breaditnow-auth-api/build/libs/*.jar ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/ubuntu/breaditnow/service/auth-api/
          #          scp -o StrictHostKeyChecking=no breaditnow-customer-api/build/libs/*.jar ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/ubuntu/breaditnow/service/customer-api/
               scp -o StrictHostKeyChecking=no breaditnow-owner-api/build/libs/*.jar ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/ubuntu/breaditnow/service/owner-api/

      - name: SSH into EC2 and deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_EC2_HOST }} << 'EOF'
            cd /home/ubuntu/breaditnow/docker
            docker-compose -f docker-compose.app.yml down
            docker-compose -f docker-compose.app.yml up -d --build
          EOF
 
