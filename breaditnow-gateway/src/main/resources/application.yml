server:
  port: 8080

spring:
  application:
    name: gateway-service

  webflux:
    static-path-pattern: "/static/**"

  cloud:
    gateway:
      routes:
        - id: oauth2
          uri: http://localhost:9000/
          predicates:
            - Path=/oauth2/authorization/**, /oauth/callback/**  # 소셜 로그인 처리

        - id: auth-api
          uri: http://localhost:9000/
          predicates:
            - Path=/auth-api/**
          filters:
            - RewritePath=/auth-api/(?<segment>.*), /$\{segment}

        - id: customer-api
          uri: http://localhost:9001/
          predicates:
            - Path=/customer-api/**
          filters:
            - JwtAuthentication=ROLE_CUSTOMER
            - RewritePath=/customer-api/(?<segment>.*), /$\{segment}

        - id: owner-api
          uri: http://localhost:9002/
          predicates:
            - Path=/owner-api/**
          filters:
            - JwtAuthentication=ROLE_OWNER
            - RewritePath=/owner-api/(?<segment>.*), /$\{segment}

springdoc:
  enable-native-support: true
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    use-root-path: true
    config-url: /v3/api-docs/swagger-config
    urls:
      - url: /auth-api/v3/api-docs
        name: Auth API
      - url: /customer-api/v3/api-docs
        name: Customer API
      - url: /owner-api/v3/api-docs
        name: Owner API

auth:
  token:
    secret-key: ${AUTH_TOKEN_SECRET_KEY}

