server:
  port: 8080

spring:
  application:
    name: gateway-service

  webflux:
    static-path-pattern: "/static/**"

  cloud:
    gateway:
      routes:
        - id: oauth2
          uri: http://localhost:9000/
          predicates:
            - Path=/oauth2/authorization/**, /oauth/callback/**  # 소셜 로그인 처리

        - id: auth-api
          uri: http://localhost:9000/
          predicates:
            - Path=/auth-api/**
          filters:
            - RewritePath=/auth-api/(?<segment>.*), /$\{segment}

        - id: customer-api
          uri: http://localhost:9001/
          predicates:
            - Path=/customer-api/**
          filters:
            - RewritePath=/customer-api/(?<segment>.*), /$\{segment}
            - JwtAuthentication=ROLE_CUSTOMER

        - id: owner-api
          uri: http://localhost:9002/
          predicates:
            - Path=/owner-api/**
          filters:
            - RewritePath=/owner-api/(?<segment>.*), /$\{segment}
            - JwtAuthentication=ROLE_OWNER

auth:
  token:
    header: Authorization
    secret-key: ${AUTH_TOKEN_SECRET_KEY}
    access-token-valid-millisecond: 86400000  # 1 day in milliseconds
    refresh-token-valid-millisecond: 604800000  # 7 days in milliseconds
    refresh-cookie-key: ${REFRESH_COOKIE_KEY}
