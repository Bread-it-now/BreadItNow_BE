server:
  port: 9001

spring:
  application:
    name: customer-api

  banner:
    location: static/banner/banner.txt
    charset: UTF-8

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

geolocation:
  kakao:
    client-id: ${OAUTH2_KAKAO_CLIENT_ID}

logging:
  config: classpath:logging/logback-spring.xml
  file:
    path: logs
  level:
    root: INFO
