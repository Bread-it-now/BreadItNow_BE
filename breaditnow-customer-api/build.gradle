plugins {
    id 'java'
}

group = 'com.breaditnow'
version = '0.0.1-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation project(":breaditnow-mysql")
    implementation project(":breaditnow-common")
}

test {
    useJUnitPlatform()
}

bootJar{
    enabled=false
}

jar{
    enabled=true
}