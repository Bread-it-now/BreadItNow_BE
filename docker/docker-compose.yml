version: '3.9'

services:
  bin-mysql:
    image: mysql:8.4.3
    container_name: bin_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=breaditnow
    ports:
      - "3306:3306"
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  bin-redis:
    image: redis:latest
    container_name: bin_redis
    ports:
      - "6379:6379"
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  bin-rabbitmq:
    image: rabbitmq:3-management
    container_name: bin_rabbitmq
    environment:
      - RABBITMQ_ERLANG_COOKIE=My-Cookies
      - RABBITMQ_DEFAULT_USER=root
      - RABBITMQ_DEFAULT_PASS=root
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - bin-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  bin-network:
    driver: bridge
