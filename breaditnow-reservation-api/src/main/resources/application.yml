server:
  port: 9003

spring:
  application:
    name: reservation-api

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        default_batch_fetch_size: 100
        use_sql_comments: true
    open-in-view: false
    defer-datasource-initialization: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DATASOURCE_URL}?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

  rabbitmq:
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0

#p6spy query logging
decorator:
  datasource:
    p6spy:
      enable-logging: true

fcm:
  file_path: file:config/breaditnow-fcm.json
  project_id: ${FCM_PROJECT_ID}

api:
  internal:
    customer-service:
      url: http://localhost:9001
    owner-service:
      url: http://localhost:9002