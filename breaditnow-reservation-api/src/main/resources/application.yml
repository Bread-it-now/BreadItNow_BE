server:
  port: 9003

spring:
  application:
    name: reservation-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        default_batch_fetch_size: 100
        use_sql_comments: true
    open-in-view: false
    defer-datasource-initialization: true
  rabbitmq:
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0

decorator:
  datasource:
    p6spy:
      enable-logging: true